<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue-Bot Plus | אפליקציית פדגוגיה לגן</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts for Assistant & Fredoka (Rounded playful font) -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Assistant', 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fef08a 0%, #ccfbf1 50%, #e0f2fe 100%);
            margin: 0;
            padding: 0;
            color: #1e293b;
            min-height: 100vh;
        }
        .playful-title {
            font-family: 'Fredoka', sans-serif;
        }
        .grid-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            background-color: #cbd5e1;
            border: 8px solid #475569;
            border-radius: 24px;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            overflow: relative;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            position: relative;
        }
        .grid-cell {
            background-color: rgba(255, 255, 255, 0.95);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2px;
            text-align: center;
            transition: all 0.2s ease;
            user-select: none;
        }
        .grid-cell:hover {
            background-color: #fefefc;
            box-shadow: inset 0 0 10px rgba(20, 184, 166, 0.2);
        }
        .card-image-container {
            width: 80%;
            height: 65%;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            margin-bottom: 2px;
            transition: transform 0.2s;
        }
        .card-title {
            font-size: 0.72rem;
            font-weight: 800;
            color: #0f172a;
            background: #f1f5f9;
            padding: 2px 6px;
            border-radius: 6px;
            line-height: 1.1;
            max-width: 95%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            border: 1px solid #e2e8f0;
        }
        /* Static Bot marker styling */
        .static-bot-marker {
            width: 85%;
            height: 85%;
            object-fit: contain;
            user-select: none;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .loader-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 6px solid #0d9488;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #0d9488 transparent transparent transparent;
        }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // קישורי ה-GitHub שלך לתמונות הסטטיות (לוגו מתיא חיפה ורובוט בלו-בוט)
        const BLUE_BOT_IMAGE_URL = "https://raw.githubusercontent.com/EfratAviran/BlueBot/main/bluebot.jpg";
        const MATYA_HAIFA_LOGO_URL = "https://raw.githubusercontent.com/EfratAviran/BlueBot/main/matia.png";

        const MatyaHaifaFallback = () => (
            <div className="flex flex-col items-center justify-center bg-white/95 text-teal-800 px-8 py-4 rounded-2xl shadow-md border-2 border-teal-400 font-bold min-w-[160px]">
                <span className="text-[16px] font-extrabold tracking-tight">מתיא חיפה</span>
                <span className="text-[11px] font-bold text-teal-600">שילוב והכלה</span>
            </div>
        );

        // מאגר נושאים מובנה מראש באיכות פדגוגית עשירה ביותר
        const PREDEFINED_TOPICS = {
            "סתיו": {
                activityTitle: "חוקרים את סימני הסתיו עם בלו-בוט",
                activityType: "משחק מסלול ולמידה חווייתית",
                goal: "זיהוי והמשגה של מאפייני עונת הסתיו (חילזון, נחליאלי, ענן גשם, עלה שלכת, חצב) ופיתוח מיומנויות תכנון מרחבי ומניה.",
                basicInstructions: "הניחו את הבלו-בוט בנקודת ההתחלה. בקשו מהילד לזהות את אחד מסמלי הסתיו על גבי הלוח, לתאר אותו בקול, ולתכנן את הדרך של הבלו-בוט אליו.",
                advancedInstructions: "הילדים יתכננו מסלול המשלב פנייה (למשל: ללכת לענן הגשם ולאחר מכן לפנות ימינה כדי להגיע לחילזון) ולמנות את מספר הצעדים הכולל.",
                spaceActivityInstructions: "הגננת תפזר את כרטיסיות הסתיו המודפסות במרחב הגן. הילדים ינועו בחדר לפי קצב תוף, ובעצירת המוזיקה עליהם לעמוד ליד הכרטיסייה שהגננת מכריזה עליה (למשל: 'נחליאלי!') ולבצע תנועה מתאימה.",
                botStartPos: { row: 5, col: 0 },
                cards: [
                    { id: "s1", hebrewName: "עלה שלכת", emoji: "🍁", bg: "from-orange-100 to-amber-200", row: 1, col: 2 },
                    { id: "s2", hebrewName: "נחליאלי", emoji: "🐦", bg: "from-slate-100 to-slate-200", row: 3, col: 4 },
                    { id: "s3", hebrewName: "חילזון", emoji: "🐌", bg: "from-amber-100 to-amber-200", row: 0, col: 5 },
                    { id: "s4", hebrewName: "ענן גשם", emoji: "🌧️", bg: "from-sky-100 to-blue-200", row: 2, col: 1 },
                    { id: "s5", hebrewName: "חצב בסתיו", emoji: "🌾", bg: "from-emerald-100 to-teal-200", row: 4, col: 3 }
                ]
            },
            "חנוכה": {
                activityTitle: "מפיצים אור עם בלו-בוט בחנוכה",
                activityType: "חיפוש המטמון והשלמת סמלים",
                goal: "חיזוק אוצר המילים הקשור לחג החנוכה (סביבון, חנוכייה, סופגנייה, כד שמן, נר), תרגול זיהוי חזותי ופתרון בעיות.",
                basicInstructions: "הילד בוחר כרטיסיית חנוכה מתוך קופסה, שיום המושג ותכנון קוד לבלו-בוט כדי להגיע לאותו הסמל על גבי המשטח.",
                advancedInstructions: "תכנון קוד מורכב: הבלו-בוט צריך לעבור דרך 'כד השמן' כדי 'להדליק' את 'החנוכייה' הממוקמת בצד השני של הלוח.",
                spaceActivityInstructions: "מניחים את כרטיסיות חנוכה המודפסות על הרצפה במרחב הגן. הילדים צריכים לדלג סביב הכרטיסיות כמו סביבונים, וכאשר הגננת קוראת בשם של חפץ, עליהם להתאסף סביבו ולהגיד חרוז שקשור אליו.",
                botStartPos: { row: 4, col: 1 },
                cards: [
                    { id: "h1", hebrewName: "סביבון", emoji: "☊", bg: "from-blue-100 to-cyan-200", row: 0, col: 3, isSpecialIcon: true, iconText: "סביבון" }, // custom safe icon representation
                    { id: "h2", hebrewName: "חנוכייה", emoji: "🕎", bg: "from-yellow-100 to-amber-200", row: 2, col: 5 },
                    { id: "h3", hebrewName: "סופגנייה", emoji: "🍩", bg: "from-rose-100 to-orange-200", row: 1, col: 1 },
                    { id: "h4", hebrewName: "כד שמן", emoji: "🏺", bg: "from-amber-100 to-yellow-200", row: 3, col: 2 },
                    { id: "h5", hebrewName: "נר חנוכה", emoji: "🕯️", bg: "from-orange-100 to-red-200", row: 5, col: 4 }
                ]
            },
            "פירות הדר": {
                activityTitle: "מסע פירות הדר ריחני וצבעוני",
                activityType: "שיוך ומיון קבוצות",
                goal: "זיהוי פירות ההדר (תפוז, לימון, קלמנטינה, אשכולית, פומלה), פיתוח חוש הריח והטעם, ותרגול תפיסת מרחב.",
                basicInstructions: "הילד מקבל פרי הדר אמיתי למישוש או הרחה, מזהה אותו ומכוון את הבלו-בוט אל כרטיסיית הפרי התואמת על גבי הלוח.",
                advancedInstructions: "חלוקה לפי מאפיינים: תכנון מסלול בלו-בוט שיעבור רק דרך פירות הדר בצבע כתום (תפוז וקלמנטינה) תוך הימנעות מהפירות הצהובים.",
                spaceActivityInstructions: "הילדים מניחים את הכרטיסיות על הרצפה במרחב הגן. הילדים הופכים ל'סוחטי מיץ' - הם צריכים לרוץ אל הפרי שהגננת מכריזה עליו, לעשות תנועת סחיטה בידיים ולהגיד איזה טעם יש למיץ (מתוק או חמוץ).",
                botStartPos: { row: 3, col: 3 },
                cards: [
                    { id: "p1", hebrewName: "תפוז", emoji: "🍊", bg: "from-orange-100 to-amber-200", row: 0, col: 2 },
                    { id: "p2", hebrewName: "לימון", emoji: "🍋", bg: "from-yellow-100 to-lime-100", row: 4, col: 5 },
                    { id: "p3", hebrewName: "קלמנטינה", emoji: "🍊", bg: "from-orange-100 to-yellow-100", row: 2, col: 1 },
                    { id: "p4", hebrewName: "אשכולית", emoji: "🍈", bg: "from-red-100 to-rose-200", row: 1, col: 4 },
                    { id: "p5", hebrewName: "פומלה", emoji: "🍏", bg: "from-lime-100 to-emerald-200", row: 5, col: 2 }
                ]
            },
            "חיות": {
                activityTitle: "מבקרים את החיות בחווה עם בלו-בוט",
                activityType: "זיהוי שמיעתי ושיוך מושגים",
                goal: "הכרת חיות המשק (פרה, כבשה, תרנגול, סוס, אפרוח), שיוך קולות החיות למראן ותרגול קידוד צעד-אחר-צעד.",
                basicInstructions: "הגננת משמיעה קול של חיה מהחווה. הילד מזהה את החיה, משמיע את הקול בעצמו, ומנווט את הבלו-בוט אל המשבצת המתאימה.",
                advancedInstructions: "הילד צריך לנווט את הבלו-בוט אל החיה, ובכל משבצת בדרך להשמיע קול של חיה אחרת שעבר דרכה.",
                spaceActivityInstructions: "הכרטיסיות מפוזרות בגן. כל ילד מקבל 'זהות' של חיה. עליהם לנוע בחדר ולהשמיע קולות של אותה חיה, ולהתאסף יחד סביב כרטיסיית החיה המאוירת המתאימה להם.",
                botStartPos: { row: 5, col: 5 },
                cards: [
                    { id: "a1", hebrewName: "פרה חביבה", emoji: "🐄", bg: "from-slate-100 to-stone-200", row: 0, col: 1 },
                    { id: "a2", hebrewName: "כבשה צמרירית", emoji: "🐑", bg: "from-gray-100 to-neutral-200", row: 3, col: 0 },
                    { id: "a3", hebrewName: "תרנגול קורא", emoji: "🐓", bg: "from-red-100 to-amber-200", row: 2, col: 4 },
                    { id: "a4", hebrewName: "סוס אציל", emoji: "🐎", bg: "from-amber-200 to-amber-300", row: 1, col: 3 },
                    { id: "a5", hebrewName: "אפרוח מתוק", emoji: "🐥", bg: "from-yellow-100 to-yellow-200", row: 4, col: 2 }
                ]
            }
        };

        // רשימת אימוג'ים וקטגוריות עבור ייצור נושאים דינמיים מותאמים אישית
        const EMOJI_MAPPING = {
            "שמש": "☀️", "ירח": "🌙", "כוכב": "⭐", "פרח": "🌸", "עץ": "🌳", "בית": "🏠", "מכונית": "🚗",
            "רכבת": "🚂", "סירה": "⛵", "מטוס": "✈️", "בלון": "🎈", "ספר": "📚", "כדור": "⚽", "חבר": "🧑‍🤝‍🧑",
            "אמא": "👩", "אבא": "👨", "לב": "❤️", "גשם": "🌧️", "שלג": "❄️", "חורף": "⛄", "אביב": "🦋",
            "קיץ": "🏖️", "ים": "🌊", "דג": "🐟", "ציפור": "🐦", "פרפר": "🦋", "דבורה": "🐝", "חתול": "🐱",
            "כלב": "🐶", "ארנב": "🐰", "קוף": "🐵", "אריה": "🦁", "דוב": "🐻", "פיל": "🐘", "ג'ירפה": "🦒",
            "לחם": "🍞", "גבינה": "🧀", "תפוח": "🍎", "בננה": "🍌", "ענבים": "🍇", "תות": "🍓", "גלידה": "🍦"
        };

        const getRandomEmoji = (word) => {
            for (let key in EMOJI_MAPPING) {
                if (word.includes(key) || key.includes(word)) {
                    return EMOJI_MAPPING[key];
                }
            }
            const fallbackEmojis = ["🎨", "🌟", "🎈", "🪁", "🧸", "🎉", "❤️", "✨", "🧩", "🦄", "🌈"];
            return fallbackEmojis[Math.floor(Math.random() * fallbackEmojis.length)];
        };

        // מחולל פדגוגי דינמי חכם המייצר פעילות מלאה לכל נושא שהגננת תקליד
        const generateDynamicActivity = (topic, description) => {
            const cleanTopic = topic.trim();
            const words = description ? description.split(/[,\s]+/).filter(w => w.length > 1) : [];
            
            // הגדרת מילים ברירת מחדל אם הגננת לא כתבה אוצר מילים
            const defaultWords = [
                `סמל ${cleanTopic} א'`, `מושג ${cleanTopic} ב'`, `חפץ ${cleanTopic} ג'`, `ציור ${cleanTopic} ד'`, `משחק ${cleanTopic} ה'`
            ];
            
            const finalWords = words.length >= 5 ? words.slice(0, 5) : [
                ...words,
                ...defaultWords.slice(0, 5 - words.length)
            ];

            const gridPositions = [
                { row: 1, col: 2 },
                { row: 3, col: 4 },
                { row: 0, col: 5 },
                { row: 2, col: 1 },
                { row: 4, col: 3 }
            ];

            const backgroundGradients = [
                "from-orange-100 to-amber-200",
                "from-sky-100 to-blue-200",
                "from-rose-100 to-orange-200",
                "from-emerald-100 to-teal-200",
                "from-yellow-100 to-amber-200"
            ];

            const cards = finalWords.map((word, idx) => ({
                id: `dynamic_${idx}`,
                hebrewName: word,
                emoji: getRandomEmoji(word),
                bg: backgroundGradients[idx],
                row: gridPositions[idx].row,
                col: gridPositions[idx].col
            }));

            return {
                activityTitle: `מגלים וחוקרים את נושא ה${cleanTopic}`,
                activityType: "חיפוש פעיל ולימוד כיוונים",
                goal: `הבנה מעמיקה, שיום והרחבת אוצר המילים בנושא ${cleanTopic} (${finalWords.join(', ')}), תוך תרגול של תפיסה מרחבית, מניית צעדים ותכנון מסלול קידוד עם הבלו-בוט.`,
                basicInstructions: `הניחו את הבלו-בוט על נקודת ההתחלה. הציגו לילדים את כרטיסיות ה${cleanTopic}, בקשו מהם לזהות את האיורים על גבי המשטח ולכוון את הבלו-בוט אל כרטיסיית היעד המתאימה.`,
                advancedInstructions: `תכננו את המסלול תוך הוספת מכשולים דמיוניים על גבי הלוח. הילדים יצטרכו לתכנן דרך עוקפת כדי להגיע אל כרטיסיית ה${cleanTopic} שבחרתם.`,
                spaceActivityInstructions: `פזרו את כרטיסיות ה${cleanTopic} המודפסות במרחב הגן. הילדים ירקדו וינועו לצלילי מוזיקה, וכאשר המוזיקה נפסקת, עליהם למהר ולעמוד ליד הכרטיסייה שהגננת קוראת בשמה ולבצע חיקוי תנועתי חמוד שקשור למילה.`,
                botStartPos: { row: 5, col: 0 },
                cards: cards
            };
        };

        const App = () => {
            const [topic, setTopic] = useState('');
            const [description, setDescription] = useState('');
            const [loadingState, setLoadingState] = useState({ isLoading: false, message: '' });
            const [activity, setActivity] = useState(null);
            const [error, setError] = useState('');
            const [toastMessage, setToastMessage] = useState(null);
            const [extensionActivity, setExtensionActivity] = useState('');
            const [loadingExtension, setLoadingExtension] = useState(false);
            const [logoLoadError, setLogoLoadError] = useState(false);
            const [botLoadError, setBotLoadError] = useState(false);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleGenerate = (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!topic.trim()) return;

                setLoadingState({ isLoading: true, message: 'הבינה המלאכותית מכינה מטרות וממקמת כרטיסיות על הלוח...' });
                setError('');
                setActivity(null);
                setExtensionActivity('');

                // סימולציית טעינה חווייתית וקצרה בשביל הילדים והגננת
                setTimeout(() => {
                    let selectedPlan;
                    
                    // בדיקה האם הנושא שהוזן קיים במאגר המובנה
                    const matchingKey = Object.keys(PREDEFINED_TOPICS).find(key => 
                        topic.trim().includes(key) || key.includes(topic.trim())
                    );

                    if (matchingKey) {
                        selectedPlan = PREDEFINED_TOPICS[matchingKey];
                    } else {
                        // ייצור פעילות דינמית מותאמת אישית לכל נושא אחר
                        selectedPlan = generateDynamicActivity(topic, description);
                    }

                    setActivity(selectedPlan);
                    setLoadingState({ isLoading: false, message: '' });
                    playBeep('success');
                    showToast('הפעילות מוכנה לשימוש בגן! 🐞🎨');
                }, 1200);
            };

            const handleSuggestExtension = () => {
                if (!activity) return;
                setLoadingExtension(true);
                
                setTimeout(() => {
                    const extensions = [
                        `הציבו מכשול פיזי (כמו קוביה או בובה קטנה) על אחת המשבצות הריקות בלוח. בקשו מהילד לתכנן מסלול שעוקף את המכשול ומגיע בבטחה לכרטיסיית היעד.`,
                        `שחקו 'משחק הפוך': תכנתו קוד בבלו-בוט מבלי לגלות לילד לאן הוא נוסע. הילד צריך לעקוב אחרי כיוון הנסיעה ולנחש ליד איזה כרטיסייה הבלו-בוט יעצור!`,
                        `חברו סיפור קצר המשלב 2 כרטיסיות מהלוח. הילד צריך לתכנת את הבלו-בוט כך שיסע קודם לכרטיסייה הראשונה בסיפור, ולאחר מכן ימשיך ישירות לשנייה.`
                    ];
                    const randomExtension = extensions[Math.floor(Math.random() * extensions.length)];
                    setExtensionActivity(randomExtension);
                    setLoadingExtension(false);
                }, 800);
            };

            const handlePrint = () => {
                if (!activity) return;
                const pWindow = window.open('', '_blank');
                pWindow.document.write(`
                    <html lang="he" dir="rtl">
                    <head>
                        <title>הדפסה - ${activity.activityTitle}</title>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@700;800&display=swap');
                            body { font-family: 'Assistant', sans-serif; text-align: center; padding: 20px; background: #fafafa; }
                            .card { 
                                border: 6px dashed #0d9488; 
                                border-radius: 28px; 
                                width: 14.5cm; 
                                height: 14.5cm; 
                                margin: 2cm auto; 
                                display: flex; 
                                flex-direction: column; 
                                items-center; 
                                justify-content: space-between; 
                                padding: 40px; 
                                page-break-after: always; 
                                box-sizing: border-box; 
                                background: white;
                                box-shadow: 0 10px 20px rgba(0,0,0,0.05);
                            }
                            .emoji-box {
                                font-size: 140px;
                                margin-top: 30px;
                                display: flex;
                                align-items: center;
                                justify-content: center;
                                flex-grow: 1;
                            }
                            h2 { 
                                font-size: 44px; 
                                margin: 20px 0 0 0; 
                                color: #0f172a; 
                                border-top: 2px solid #e2e8f0; 
                                padding-top: 20px; 
                                width: 100%;
                            }
                        </style>
                    </head>
                    <body>
                        ${activity.cards.map(c => `
                            <div class="card">
                                <div class="emoji-box">${c.emoji}</div>
                                <h2>${c.hebrewName}</h2>
                            </div>
                        `).join('')}
                        <script>setTimeout(() => window.print(), 800);<\/script>
                    </body>
                    </html>
                `);
                pWindow.document.close();
            };

            return (
                <div className="min-h-screen pb-16 relative">
                    <header className="bg-gradient-to-r from-teal-500 via-emerald-400 to-cyan-500 text-slate-900 py-6 px-4 shadow-md rounded-b-[2.5rem]">
                        <div className="max-w-4xl mx-auto flex items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                {botLoadError ? <span className="text-6xl sm:text-7xl select-none">🐞</span> : (
                                    <img src={BLUE_BOT_IMAGE_URL} alt="בלו-בוט" className="w-24 h-24 sm:w-28 sm:h-28 object-contain select-none bg-white/90 p-1.5 rounded-2xl shadow-sm border border-teal-100" onError={() => setBotLoadError(true)} />
                                )}
                                <div>
                                    <h1 className="text-4xl sm:text-5xl font-black playful-title text-slate-950">בלו-בוט פלוס</h1>
                                    <p className="text-slate-900 text-sm sm:text-base font-bold mt-1">מחולל פעילויות פדגוגיות עבור ילדי הגן</p>
                                </div>
                            </div>
                            <div>
                                {!logoLoadError ? (
                                    <img src={MATYA_HAIFA_LOGO_URL} alt="מתיא חיפה" className="h-28 sm:h-32 w-auto object-contain bg-white/90 p-1.5 rounded-2xl shadow-sm border border-teal-100" onError={() => setLogoLoadError(true)} />
                                ) : <MatyaHaifaFallback />}
                            </div>
                        </div>
                    </header>

                    {toastMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-teal-600 text-white font-extrabold py-3 px-6 rounded-full shadow-2xl animate-bounce">
                            {toastMessage}
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto px-4 mt-8 grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-md border space-y-5">
                                <h2 className="text-xl font-black text-slate-800 playful-title flex items-center gap-2">
                                    <span>🤖 יצירת פעילות לגן</span>
                                </h2>
                                
                                <form onSubmit={handleGenerate} className="space-y-4">
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-1">נושא הפעילות:</label>
                                        <input type="text" value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="למשל: סתיו, חנוכה, פירות הדר, חיות..." className="w-full p-3 border border-slate-200 rounded-2xl outline-none focus:border-teal-400 font-bold bg-slate-50" required />
                                        <span className="text-[11px] text-slate-400 mt-1 block">ניתן להקליד כל נושא שעולה על דעתך!</span>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-bold text-slate-600 mb-1">מילים או מושגים ספציפיים (אופציונלי):</label>
                                        <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="כתבי כאן מושגים מופרדים בפסיק (למשל: נחליאלי, חצב, חילזון)..." className="w-full p-3 border border-slate-200 rounded-2xl outline-none focus:border-teal-400 text-sm bg-slate-50" rows="3" />
                                    </div>
                                    <button type="submit" disabled={loadingState.isLoading} className="w-full bg-gradient-to-r from-teal-600 to-emerald-600 hover:from-teal-700 hover:to-emerald-700 text-white font-extrabold py-4 rounded-2xl shadow-lg disabled:opacity-50 transition-all text-lg">
                                        {loadingState.isLoading ? 'יוצר פעילות ומאייר...' : 'הצע פעילות חוויתית ✨'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-7 space-y-6">
                            {loadingState.isLoading && (
                                <div className="glass-panel p-12 rounded-3xl text-center flex flex-col items-center">
                                    <div className="loader-ring mb-4"><div></div><div></div><div></div><div></div></div>
                                    <h3 className="text-lg font-bold text-teal-800 animate-pulse">{loadingState.message}</h3>
                                </div>
                            )}

                            {error && (
                                <div className="bg-red-50 text-red-700 p-5 rounded-3xl border text-center shadow-sm font-bold">
                                    ⚠️ {error}
                                </div>
                            )}

                            {activity && !loadingState.isLoading && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-md border relative">
                                        <span className="text-xs font-extrabold text-teal-700 bg-teal-50 px-3 py-1 rounded-full">{activity.activityType}</span>
                                        <h2 className="text-2xl font-black text-slate-900 mt-2 playful-title">{activity.activityTitle}</h2>
                                        
                                        <div className="mt-4 bg-slate-50 p-3.5 rounded-xl text-sm leading-relaxed border border-slate-100">
                                            <strong className="text-slate-800 block mb-1">🎯 מטרה פדגוגית:</strong> {activity.goal}
                                        </div>
                                        <div className="mt-4 text-sm bg-teal-50/40 p-3.5 rounded-xl border border-teal-100/50 leading-relaxed">
                                            <strong className="text-teal-700 block mb-1">👣 שלב א' (משחק בסיסי על המשטח):</strong> {activity.basicInstructions}
                                        </div>
                                        <div className="mt-3 text-sm bg-indigo-50/40 p-3.5 rounded-xl border border-indigo-100/50 leading-relaxed">
                                            <strong className="text-indigo-700 block mb-1">🤖 שלב ב' (קידוד ואתגר מתקדם):</strong> {activity.advancedInstructions}
                                        </div>
                                        <div className="mt-3 text-sm bg-amber-50/40 p-3.5 rounded-xl border border-amber-100/50 leading-relaxed">
                                            <strong className="text-amber-800 block mb-1">🏃‍♂️ במרחב הגן (הפעלה חווייתית מחוץ למשטח):</strong> {activity.spaceActivityInstructions}
                                        </div>

                                        <div className="mt-4 pt-4 border-t">
                                            <button onClick={handleSuggestExtension} disabled={loadingExtension} className="text-xs font-bold text-emerald-700 bg-emerald-50 hover:bg-emerald-100 px-4 py-2 rounded-xl transition-all">
                                                {loadingExtension ? 'חושב ומחבר...' : '💡 הציעו רעיון נוסף למשחק'}
                                            </button>
                                            {extensionActivity && (
                                                <p className="mt-2 text-xs bg-emerald-50/30 p-3 rounded-lg border border-emerald-100 text-slate-700 leading-relaxed animate-fadeIn">{extensionActivity}</p>
                                            )}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-3xl shadow-lg space-y-6">
                                        <h3 className="text-md font-bold text-slate-700 text-center">הדמיית לוח הבלו-בוט בגן (6x6 משבצות)</h3>
                                        <div className="grid-board">
                                            {/* בלו-בוט על המשטח */}
                                            <div className="absolute z-30" style={{ top: `${(activity.botStartPos.row / 6) * 100}%`, left: `${(activity.botStartPos.col / 6) * 100}%`, width: "15%", height: "15%" }}>
                                                <img src={BLUE_BOT_IMAGE_URL} className="static-bot-marker" onError={(e) => e.target.style.display='none'} />
                                            </div>

                                            {Array.from({ length: 36 }).map((_, idx) => {
                                                const r = Math.floor(idx / 6);
                                                const c = idx % 6;
                                                const card = activity.cards.find(card => card.row === r && card.col === c);

                                                return (
                                                    <div key={idx} className="grid-cell border border-slate-200/40">
                                                        {card && (
                                                            <div className="w-full h-full flex flex-col items-center justify-center p-1">
                                                                <div className={`w-full h-2/3 flex items-center justify-center text-2xl bg-gradient-to-br ${card.bg} rounded-lg shadow-sm border border-slate-100`}>
                                                                    {card.isSpecialIcon ? (
                                                                        <span className="text-[11px] font-bold text-blue-800 tracking-tight">{card.iconText}</span>
                                                                    ) : card.emoji}
                                                                </div>
                                                                <span className="card-title mt-1">{card.hebrewName}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="flex gap-4">
                                            <button onClick={handlePrint} className="flex-1 bg-gradient-to-r from-orange-400 to-amber-500 hover:from-orange-500 hover:to-amber-600 text-white font-extrabold py-3.5 rounded-2xl shadow-md transition-all text-md">
                                                🖨️ הדפסת כרטיסיות מרהיבות לגן (15x15 ס"מ)
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
