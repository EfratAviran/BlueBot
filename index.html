<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue-Bot Plus | אפליקציית פדגוגיה לגן</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Google Fonts for Assistant & Fredoka (Rounded playful font) -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700;800&family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Assistant', 'Fredoka', sans-serif;
            background: linear-gradient(135deg, #fef08a 0%, #ccfbf1 50%, #e0f2fe 100%);
            margin: 0;
            padding: 0;
            color: #1e293b;
            min-height: 100vh;
        }
        .playful-title {
            font-family: 'Fredoka', sans-serif;
        }
        .grid-board {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 4px;
            background-color: #cbd5e1;
            border: 8px solid #475569;
            border-radius: 24px;
            aspect-ratio: 1 / 1;
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            overflow: relative;
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.15);
            position: relative;
        }
        .grid-cell {
            background-color: rgba(255, 255, 255, 0.95);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2px;
            text-align: center;
            transition: all 0.2s ease;
            user-select: none;
        }
        .grid-cell:hover {
            background-color: #fefefc;
            box-shadow: inset 0 0 10px rgba(20, 184, 166, 0.2);
        }
        .card-image {
            width: 80%;
            height: 65%;
            object-fit: contain;
            border-radius: 12px;
            margin-bottom: 2px;
            transition: transform 0.2s;
        }
        .card-title {
            font-size: 0.7rem;
            font-weight: 700;
            color: #1e293b;
            background: #f1f5f9;
            padding: 1px 4px;
            border-radius: 4px;
            line-height: 1.1;
            max-width: 95%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Static Bot marker styling */
        .static-bot-marker {
            width: 85%;
            height: 85%;
            object-fit: contain;
            user-select: none;
            animation: float 2.5s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }
        .loader-ring {
            display: inline-block;
            position: relative;
            width: 80px;
            height: 80px;
        }
        .loader-ring div {
            box-sizing: border-box;
            display: block;
            position: absolute;
            width: 64px;
            height: 64px;
            margin: 8px;
            border: 6px solid #0d9488;
            border-radius: 50%;
            animation: loader-ring 1.2s cubic-bezier(0.5, 0, 0.5, 1) infinite;
            border-color: #0d9488 transparent transparent transparent;
        }
        @keyframes loader-ring {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 32px rgba(31, 38, 135, 0.05);
        }
        @media print {
            body { background: white; color: black; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // הגדרת מפתח ה-API בצורה התקנית עבור ה-Canvas (המפתח יוזרק אוטומטית בזמן ריצה)
        const apiKey = ""; 

        // קישורי ה-GitHub שלך לתמונות הסטטיות (לוגו מתיא חיפה ורובוט בלו-בוט)
        const BLUE_BOT_IMAGE_URL = "https://raw.githubusercontent.com/EfratAviran/BlueBot/main/bluebot.jpg";
        const MATYA_HAIFA_LOGO_URL = "https://raw.githubusercontent.com/EfratAviran/BlueBot/main/matia.png";

        const MatyaHaifaFallback = () => (
            <div className="flex flex-col items-center justify-center bg-white/95 text-teal-800 px-8 py-4 rounded-2xl shadow-md border-2 border-teal-400 font-bold min-w-[160px]">
                <span className="text-[16px] font-extrabold tracking-tight">מתיא חיפה</span>
                <span className="text-[11px] font-bold text-teal-600">שילוב והכלה</span>
            </div>
        );

        const playBeep = (type = 'click') => {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);

                if (type === 'click') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(1000, ctx.currentTime);
                    gain.gain.setValueAtTime(0.05, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.05);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.05);
                } else if (type === 'success') {
                    const now = ctx.currentTime;
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.1);
                    osc.frequency.setValueAtTime(783.99, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                    osc.start();
                    osc.stop(now + 0.4);
                }
            } catch (e) {}
        };

        const fetchWithRetry = async (url, options, retries = 5, delay = 1000) => {
            try {
                const response = await fetch(url, options);
                if (!response.ok) {
                    if ((response.status === 429 || response.status >= 500) && retries > 0) {
                        await new Promise(res => setTimeout(res, delay));
                        return fetchWithRetry(url, options, retries - 1, delay * 2);
                    }
                    throw new Error(`שגיאה ${response.status}`);
                }
                return response;
            } catch (err) {
                if (retries > 0) {
                    await new Promise(res => setTimeout(res, delay));
                    return fetchWithRetry(url, options, retries - 1, delay * 2);
                }
                throw err;
            }
        };

        const generateActivityPlan = async (topic, description) => {
            let prompt = `אתה מדריך ומומחה פדגוגי בכיר לגיל הרך וחינוך מיוחד. הגננת ביקשה ליצור פעילות לרובוט Blue-Bot (חיפושית הקידוד) בנושא: "${topic}".\n`;
            if (description && description.trim() !== '') {
                prompt += `אוצר מילים מבוקש או מטרות פדגוגיות: "${description}".\n`;
            }
            prompt += `
משטח הבלובוט הוא גריד של 6x6 משבצות.
עליך לייצר מערך קצר, פשוט, צבעוני ומתוק שכולל כותרת מזמינה לילדים, סוג משחק, מטרה פדגוגית ברורה, הנחיות לפעילות בסיסית, הנחיות לפעילות מתקדמת (המתמקדת ברובוט), והוראות לפעילות תנועתית/חווייתית במרחב הגן העושה שימוש בכרטיסיות המודפסות מחוץ למשטח הבלו-בוט (ללא הרובוט).
עליך ליצור בדיוק 5 כרטיסיות מגוונות המתאימות לנושא.

החזר פורמט JSON בלבד, ללא מרקאפ או תגיות.
`;

            const payload = {
                contents: [{ parts: [{ text: prompt }] }],
                generationConfig: {
                    responseMimeType: "application/json",
                    responseSchema: {
                        type: "OBJECT",
                        properties: {
                            activityTitle: { type: "STRING" },
                            activityType: { type: "STRING" },
                            goal: { type: "STRING" },
                            basicInstructions: { type: "STRING" },
                            advancedInstructions: { type: "STRING" },
                            spaceActivityInstructions: { type: "STRING" },
                            botStartPos: {
                                type: "OBJECT",
                                properties: { row: { type: "INTEGER" }, col: { type: "INTEGER" } },
                                required: ["row", "col"]
                            },
                            cards: {
                                type: "ARRAY",
                                items: {
                                    type: "OBJECT",
                                    properties: {
                                        id: { type: "STRING" },
                                        hebrewName: { type: "STRING" },
                                        englishPrompt: { type: "STRING" },
                                        row: { type: "INTEGER" },
                                        col: { type: "INTEGER" }
                                    },
                                    required: ["id", "hebrewName", "englishPrompt", "row", "col"]
                                }
                            }
                        },
                        required: ["activityTitle", "activityType", "goal", "basicInstructions", "advancedInstructions", "spaceActivityInstructions", "botStartPos", "cards"]
                    }
                }
            };

            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const response = await fetchWithRetry(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            if (data.candidates?.[0]?.content?.parts?.[0]?.text) {
                return JSON.parse(data.candidates[0].content.parts[0].text.trim());
            }
            throw new Error("לא התקבל מבנה נתונים תקין מהבינה המלאכותית.");
        };

        const generateExtensionActivity = async (topic, currentPlan) => {
            const prompt = `עבור הפעילות בנושא "${topic}", שנוצרה עם הכרטיסיות הבאות: ${JSON.stringify(currentPlan.cards)}. הצע פעילות נוספת עם רובוט הבלו-בוט על גבי המשטח. כתוב הצעה קצרה ומלהיבה לגננת (עד 3 משפטים בעברית).`;
            const payload = { contents: [{ parts: [{ text: prompt }] }] };
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const response = await fetchWithRetry(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            return data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || "לא הצלחנו לייצר פעילות נוספת כרגע.";
        };

        const generateSingleImage = async (prompt) => {
            const payload = {
                instances: { prompt: prompt + ", flat vector kawaii style illustration, happy expression, vibrant colors, white background, educational children style, isolated, vector graphic" },
                parameters: { sampleCount: 1 }
            };
            const apiUrl = `https://generativelanguage.googleapis.com/v1beta/models/imagen-4.0-generate-001:predict?key=${apiKey}`;
            const response = await fetchWithRetry(apiUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await response.json();
            if (data.predictions?.[0]?.bytesBase64Encoded) {
                return `data:image/png;base64,${data.predictions[0].bytesBase64Encoded}`;
            }
            throw new Error("שגיאה ביצירת התמונה.");
        };

        const App = () => {
            const [topic, setTopic] = useState('');
            const [description, setDescription] = useState('');
            const [loadingState, setLoadingState] = useState({ isLoading: false, message: '' });
            const [activity, setActivity] = useState(null);
            const [images, setImages] = useState({});
            const [error, setError] = useState('');
            const [toastMessage, setToastMessage] = useState(null);
            const [selectedCell, setSelectedCell] = useState(null);
            const [extensionActivity, setExtensionActivity] = useState('');
            const [loadingExtension, setLoadingExtension] = useState(false);
            const [logoLoadError, setLogoLoadError] = useState(false);
            const [botLoadError, setBotLoadError] = useState(false);

            const showToast = (msg) => {
                setToastMessage(msg);
                setTimeout(() => setToastMessage(null), 3000);
            };

            const handleGenerate = async (e) => {
                if (e && e.preventDefault) e.preventDefault();
                if (!topic.trim()) return;

                setLoadingState({ isLoading: true, message: 'מכין מטרות לימודיות וממקם כרטיסיות...' });
                setError('');
                setActivity(null);
                setImages({});
                setExtensionActivity('');

                try {
                    const plan = await generateActivityPlan(topic, description);
                    setActivity(plan);

                    setLoadingState({ isLoading: true, message: 'מייצר כרטיסיות חמודות ומותאמות...' });
                    const newImages = {};

                    await Promise.all(plan.cards.map(async (card) => {
                        try {
                            const img = await generateSingleImage(card.englishPrompt);
                            newImages[card.id] = img;
                        } catch (e) {
                            newImages[card.id] = `https://placehold.co/150x150/fde047/1e293b?text=${encodeURIComponent(card.hebrewName)}`;
                        }
                    }));

                    setImages(newImages);
                    setLoadingState({ isLoading: false, message: '' });
                    playBeep('success');
                    showToast('הפעילות החדשה מוכנה! 🐞🎨');
                } catch (err) {
                    setError('חלה שגיאה תקשורת זמנית. ודאי שמפתח ה-API תקין ורענני את העמוד.');
                    setLoadingState({ isLoading: false, message: '' });
                }
            };

            const handleSuggestExtension = async () => {
                if (!activity) return;
                setLoadingExtension(true);
                try {
                    const extra = await generateExtensionActivity(topic, activity);
                    setExtensionActivity(extra);
                } catch (err) {
                    showToast('שגיאה ביצירת רעיון נוסף.');
                } finally {
                    setLoadingExtension(false);
                }
            };

            const handlePrint = () => {
                if (!activity) return;
                const pWindow = window.open('', '_blank');
                pWindow.document.write(`
                    <html lang="he" dir="rtl">
                    <head>
                        <title>הדפסה - ${activity.activityTitle}</title>
                        <style>
                            body { font-family: sans-serif; text-align: center; padding: 20px; }
                            .card { border: 4px dashed #0d9488; border-radius: 20px; width: 14cm; height: 14cm; margin: 2cm auto; display: flex; flex-direction: column; align-items: center; justify-content: space-between; padding: 20px; page-break-after: always; box-sizing: border-box; }
                            img { max-width: 80%; max-height: 70%; object-fit: contain; }
                            h2 { font-size: 32px; margin: 10px 0; }
                        </style>
                    </head>
                    <body>
                        ${activity.cards.map(c => `
                            <div class="card">
                                <img src="${images[c.id] || ''}" />
                                <h2>${c.hebrewName}</h2>
                            </div>
                        `).join('')}
                        <script>setTimeout(() => window.print(), 1000);<\/script>
                    </body>
                    </html>
                `);
                pWindow.document.close();
            };

            return (
                <div className="min-h-screen pb-16 relative">
                    <header className="bg-gradient-to-r from-teal-500 via-emerald-400 to-cyan-500 text-slate-900 py-6 px-4 shadow-md rounded-b-[2.5rem]">
                        <div className="max-w-4xl mx-auto flex items-center justify-between gap-4">
                            <div className="flex items-center gap-4">
                                {botLoadError ? <span className="text-6xl sm:text-7xl select-none">🐞</span> : (
                                    <img src={BLUE_BOT_IMAGE_URL} alt="בלו-בוט" className="w-24 h-24 sm:w-28 sm:h-28 object-contain select-none bg-white/90 p-1.5 rounded-2xl shadow-sm border border-teal-100" onError={() => setBotLoadError(true)} />
                                )}
                                <div>
                                    <h1 className="text-4xl sm:text-5xl font-black playful-title text-slate-950">בלו-בוט פלוס</h1>
                                    <p className="text-slate-900 text-sm sm:text-base font-bold mt-1">מחולל פעילויות פדגוגיות עבור ילדי הגן</p>
                                </div>
                            </div>
                            <div>
                                {!logoLoadError ? (
                                    <img src={MATYA_HAIFA_LOGO_URL} alt="מתיא חיפה" className="h-28 sm:h-32 w-auto object-contain bg-white/90 p-1.5 rounded-2xl shadow-sm border border-teal-100" onError={() => setLogoLoadError(true)} />
                                ) : <MatyaHaifaFallback />}
                            </div>
                        </div>
                    </header>

                    {toastMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 z-50 bg-teal-600 text-white font-extrabold py-3 px-6 rounded-full shadow-2xl animate-bounce">
                            {toastMessage}
                        </div>
                    )}

                    <main className="max-w-6xl mx-auto px-4 mt-8 grid lg:grid-cols-12 gap-8">
                        <div className="lg:col-span-5 space-y-6">
                            <div className="bg-white p-6 rounded-3xl shadow-md border space-y-4">
                                <h2 className="text-xl font-black text-slate-800 playful-title">🤖 יצירת פעילות</h2>
                                <form onSubmit={handleGenerate} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">נושא הפעילות:</label>
                                        <input type="text" value={topic} onChange={(e) => setTopic(e.target.value)} placeholder="למשל: חגים, עונות, צבעים..." className="w-full p-3 border-2 border-teal-100 rounded-2xl outline-none" required />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-slate-500 mb-1">מטרות או אוצר מילים (אופציונלי):</label>
                                        <textarea value={description} onChange={(e) => setDescription(e.target.value)} placeholder="מילים ספציפיות שתרצי שיופיעו..." className="w-full p-3 border-2 border-teal-100 rounded-2xl outline-none" rows="2" />
                                    </div>
                                    <button type="submit" disabled={loadingState.isLoading} className="w-full bg-gradient-to-r from-teal-600 to-emerald-600 text-white font-bold py-3.5 rounded-2xl shadow-lg disabled:opacity-50">
                                        {loadingState.isLoading ? 'מייצר...' : 'הצע פעילות חוויתית ✨'}
                                    </button>
                                </form>
                            </div>
                        </div>

                        <div className="lg:col-span-7 space-y-6">
                            {loadingState.isLoading && (
                                <div className="glass-panel p-12 rounded-3xl text-center flex flex-col items-center">
                                    <div className="loader-ring mb-4"><div></div><div></div><div></div><div></div></div>
                                    <h3 className="text-lg font-bold text-teal-800 animate-pulse">{loadingState.message}</h3>
                                </div>
                            )}

                            {error && (
                                <div className="bg-red-50 text-red-700 p-5 rounded-3xl border text-center shadow-sm font-bold">
                                    ⚠️ {error}
                                </div>
                            )}

                            {activity && !loadingState.isLoading && (
                                <div className="space-y-6">
                                    <div className="bg-white p-6 rounded-3xl shadow-md border relative">
                                        <span className="text-xs font-extrabold text-teal-700 bg-teal-50 px-3 py-1 rounded-full">{activity.activityType}</span>
                                        <h2 className="text-2xl font-black text-slate-900 mt-2 playful-title">{activity.activityTitle}</h2>
                                        
                                        <div className="mt-4 bg-slate-50 p-3 rounded-xl text-sm">
                                            <strong>מטרה:</strong> {activity.goal}
                                        </div>
                                        <div className="mt-4 text-sm bg-teal-50/40 p-3 rounded-xl">
                                            <strong className="text-teal-700">שלב א' (בסיסי):</strong> {activity.basicInstructions}
                                        </div>
                                        <div className="mt-3 text-sm bg-indigo-50/40 p-3 rounded-xl">
                                            <strong className="text-indigo-700">שלב ב' (מתקדם עם רובוט):</strong> {activity.advancedInstructions}
                                        </div>
                                        <div className="mt-3 text-sm bg-amber-50/40 p-3 rounded-xl">
                                            <strong className="text-amber-700">במרחב הגן (עם כרטיסיות):</strong> {activity.spaceActivityInstructions}
                                        </div>

                                        <div className="mt-4 pt-4 border-t">
                                            <button onClick={handleSuggestExtension} disabled={loadingExtension} className="text-xs font-bold text-emerald-700 bg-emerald-50 px-4 py-2 rounded-xl hover:bg-emerald-100">
                                                {loadingExtension ? 'חושב...' : '💡 הצע רעיון נוסף למשחק'}
                                            </button>
                                            {extensionActivity && (
                                                <p className="mt-2 text-xs bg-emerald-50/30 p-2.5 rounded-lg border text-slate-700">{extensionActivity}</p>
                                            )}
                                        </div>
                                    </div>

                                    <div className="glass-panel p-6 rounded-3xl shadow-lg">
                                        <div className="grid-board">
                                            <div className="absolute z-30" style={{ top: `${(activity.botStartPos.row / 6) * 100}%`, left: `${(activity.botStartPos.col / 6) * 100}%`, width: "15%", height: "15%" }}>
                                                <img src={BLUE_BOT_IMAGE_URL} className="static-bot-marker" onError={(e) => e.target.style.display='none'} />
                                            </div>

                                            {Array.from({ length: 36 }).map((_, idx) => {
                                                const r = Math.floor(idx / 6);
                                                const c = idx % 6;
                                                const card = activity.cards.find(card => card.row === r && card.col === c);

                                                return (
                                                    <div key={idx} className="grid-cell border border-slate-200/40">
                                                        {card && (
                                                            <div className="w-full h-full flex flex-col items-center justify-center">
                                                                <img src={images[card.id]} className="card-image drop-shadow" />
                                                                <span className="card-title">{card.hebrewName}</span>
                                                            </div>
                                                        )}
                                                    </div>
                                                );
                                            })}
                                        </div>

                                        <div className="flex gap-4 mt-6">
                                            <button onClick={handlePrint} className="flex-1 bg-gradient-to-r from-orange-400 to-amber-500 text-white font-bold py-3 rounded-xl shadow-md">
                                                🖨️ הדפסת כרטיסיות (15x15 ס"מ)
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
